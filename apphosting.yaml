# Configuración de Firebase App Hosting.
# Se despliega automáticamente en cada push a la rama conectada.
#
# Los valores NEXT_PUBLIC_* no son secretos (se incrustan en el bundle del
# navegador de todos modos); FIREBASE_PRIVATE_KEY sí lo es y vive en Secret
# Manager, nunca en este archivo. Ver docs/PUESTA-EN-MARCHA.md.

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512

env:
  # --- Config del cliente Firebase (pública, necesaria también en BUILD) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAzShbkspcsPkLZ87eYe5MWb4d3JtG5JvY"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "encomiendas-mitierra.firebaseapp.com"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "encomiendas-mitierra"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "encomiendas-mitierra.firebasestorage.app"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1095933116512"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:1095933116512:web:7ac4fd215a79ade3a4c305"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_USE_EMULATORS
    value: "false"
    availability: [BUILD, RUNTIME]

  # --- Firebase Admin (servidor, solo /api/auth/session) ---
  - variable: FIREBASE_PROJECT_ID
    value: "encomiendas-mitierra"
    availability: [RUNTIME]
  - variable: FIREBASE_CLIENT_EMAIL
    value: "firebase-adminsdk-fbsvc@encomiendas-mitierra.iam.gserviceaccount.com"
    availability: [RUNTIME]
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability: [RUNTIME]
